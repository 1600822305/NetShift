name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore dependencies
      run: dotnet restore Netch/Netch.csproj -r win-x64

    - name: Download nfapi dependencies
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://raw.githubusercontent.com/netchx/netch/main/Redirector/include/nfapi.h" -OutFile "Redirector/include/nfapi.h"
        Invoke-WebRequest -Uri "https://raw.githubusercontent.com/netchx/netch/main/Redirector/include/nfdriver.h" -OutFile "Redirector/include/nfdriver.h"
        Invoke-WebRequest -Uri "https://raw.githubusercontent.com/netchx/netch/main/Redirector/include/nfevents.h" -OutFile "Redirector/include/nfevents.h"
        Invoke-WebRequest -Uri "https://raw.githubusercontent.com/netchx/netch/main/Redirector/lib/nfapi.lib" -OutFile "Redirector/lib/nfapi.lib"
        Invoke-WebRequest -Uri "https://raw.githubusercontent.com/netchx/netch/main/Redirector/static/nfapi.dll" -OutFile "Redirector/static/nfapi.dll"

    - name: Build Redirector (C++)
      run: |
        msbuild Redirector/Redirector.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: Publish
      run: |
        dotnet publish Netch/Netch.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish

    - name: Copy native binaries and runtime files
      shell: pwsh
      run: |
        Copy-Item "Redirector/bin/Release/Redirector.bin" "publish/" -Force
        Copy-Item "Redirector/bin/Release/nfapi.dll" "publish/" -Force
        New-Item -ItemType Directory -Path "publish/bin" -Force | Out-Null
        Copy-Item "Storage/nfdriver.sys" "publish/bin/" -Force
        Copy-Item "Storage/stun.txt" "publish/bin/" -Force
        Copy-Item "Storage/aiodns.conf" "publish/bin/" -Force

    - name: Get version from tag
      id: version
      shell: bash
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Create ZIP
      shell: pwsh
      run: Compress-Archive -Path publish/* -DestinationPath "NetShift-${{ steps.version.outputs.VERSION }}-x64.zip"

    - name: Generate changelog
      id: changelog
      shell: bash
      run: |
        # Get previous tag
        PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
        if [ "$PREV_TAG" = "${{ steps.version.outputs.VERSION }}" ] || [ -z "$PREV_TAG" ]; then
          # First release, get all commits
          CHANGELOG=$(git log --pretty=format:"- %s ([%h](https://github.com/1600822305/NetShift/commit/%H))" -20)
        else
          CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s ([%h](https://github.com/1600822305/NetShift/commit/%H))")
        fi
        # Escape for multiline output
        EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        echo "CHANGELOG<<$EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "$EOF" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: "NetShift ${{ steps.version.outputs.VERSION }}"
        body: |
          ## NetShift ${{ steps.version.outputs.VERSION }}

          ### 📦 下载

          | 平台 | 文件 |
          |------|------|
          | 🪟 Windows x64 | `NetShift-${{ steps.version.outputs.VERSION }}-x64.zip` |

          ### 📝 更新内容

          ${{ steps.changelog.outputs.CHANGELOG }}

          ### 🚀 使用方法

          1. 下载上方 `NetShift-${{ steps.version.outputs.VERSION }}-x64.zip`
          2. 解压到任意目录
          3. 运行 `Netch.exe`

          ### 💻 系统要求

          - Windows 10/11 x64
          - .NET 6.0 Runtime（已内置，无需额外安装）

          ---
          > 基于 [Netch](https://github.com/netchx/netch) v1.9.7 二次开发
        files: "NetShift-${{ steps.version.outputs.VERSION }}-x64.zip"
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
