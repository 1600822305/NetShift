name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore dependencies
      run: dotnet restore Netch/Netch.csproj -r win-x64

    - name: Publish
      run: |
        dotnet publish Netch/Netch.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish

    - name: Get version from tag
      id: version
      shell: bash
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Create ZIP
      shell: pwsh
      run: Compress-Archive -Path publish/* -DestinationPath "NetShift-${{ steps.version.outputs.VERSION }}-x64.zip"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: "NetShift ${{ steps.version.outputs.VERSION }}"
        body: |
          ## NetShift ${{ steps.version.outputs.VERSION }}
          
          ### 使用方法
          1. 下载 `NetShift-${{ steps.version.outputs.VERSION }}-x64.zip`
          2. 解压到任意目录
          3. 运行 `Netch.exe`
          
          ### 系统要求
          - Windows 10/11 x64
          - .NET 6.0 Runtime (已内置，无需额外安装)
        files: "NetShift-${{ steps.version.outputs.VERSION }}-x64.zip"
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
